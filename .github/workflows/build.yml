name: Build and Release RPW Launcher

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Rust dependencies
        uses: swatinem/rust-cache@v2
        with:
          workspaces: |
            src-tauri
            stub

      - name: Install frontend dependencies
        run: npm install

      - name: Build stub launcher (RPWorld-Launcher.exe)
        shell: pwsh
        run: |
          Set-Location stub
          cargo build --release --target x86_64-pc-windows-msvc
          Set-Location ..

      - name: Build Tauri app (NSIS installer)
        run: npm run tauri build -- --bundles nsis
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}

      - name: Find built files
        id: find_files
        shell: pwsh
        run: |
          $installer = Get-ChildItem -Recurse -Path "src-tauri/target/release/bundle/nsis" -Filter "*.exe" | Select-Object -First 1
          $stub = "stub/target/x86_64-pc-windows-msvc/release/RPWorld-Launcher.exe"
          echo "INSTALLER_PATH=$($installer.FullName)" >> $env:GITHUB_OUTPUT
          echo "STUB_PATH=$stub" >> $env:GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          name: "RPWorld Launcher ${{ github.ref_name }}"
          body: |
            ## RPWorld Launcher ${{ github.ref_name }}

            ---

            ### Скачай и используй как ярлык

            **`RPWorld-Launcher.exe`** — скачай один раз, положи на рабочий стол.
            - Если лаунчер **не установлен** — автоматически скачает и установит
            - Если лаунчер **уже установлен** — сразу запустит его

            ---

            ### Полный установщик (для ручной установки)

            `RPWorld.Launcher_${{ github.ref_name }}_x64-setup.exe` — стандартный NSIS установщик

            ---

            ### Данные лаунчера
            Хранятся в: `%APPDATA%\.rpworld`

            mc_version: 1.20.1
          files: |
            ${{ steps.find_files.outputs.INSTALLER_PATH }}
            ${{ steps.find_files.outputs.STUB_PATH }}
          draft: false
          prerelease: false
