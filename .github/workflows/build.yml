name: Build and Release RPW Launcher

on:
  push:
    tags:
      - 'v*'

# ─────────────────────────────────────────────────────────────
# Parallel jobs:
#   1. build-main  — Tauri NSIS installer  (~6-8 min with cache)
#   2. build-stub  — plain Rust exe        (~90 sec with cache)
#   3. release     — publish both to GitHub Releases
# ─────────────────────────────────────────────────────────────

jobs:
  # ── 1. Main Tauri app (NSIS installer) ──────────────────────
  build-main:
    name: Build Main App
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target
          cache-on-failure: true
          shared-key: main-v2

      - name: Install npm deps
        run: npm ci

      - name: Generate icons from launcher.jpg
        run: npx @tauri-apps/cli icon images/icons/launcher.jpg

      - name: Build Tauri app (NSIS)
        run: npm run tauri build -- --bundles nsis
        env:
          TAURI_SIGNING_PRIVATE_KEY: ""
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""

      - uses: actions/upload-artifact@v4
        with:
          name: main-installer
          path: src-tauri/target/release/bundle/nsis/*.exe
          retention-days: 1

  # ── 2. Stub — tiny plain Rust exe (~400 KB, ~90 sec) ────────
  build-stub:
    name: Build Stub (plain Rust)
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: stub-rs -> target
          cache-on-failure: true
          shared-key: stub-v2

      - name: Build stub exe
        working-directory: stub-rs
        run: cargo build --release

      - uses: actions/upload-artifact@v4
        with:
          name: stub-exe
          path: stub-rs/target/release/RPWorld-Launcher.exe
          retention-days: 1

  # ── 3. Publish release ──────────────────────────────────────
  release:
    name: Publish Release
    needs: [build-main, build-stub]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: main-installer
          path: dist/main

      - uses: actions/download-artifact@v4
        with:
          name: stub-exe
          path: dist/stub

      - name: List artifacts
        run: ls -R dist/

      - uses: softprops/action-gh-release@v2
        with:
          name: "RPWorld Launcher ${{ github.ref_name }}"
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            dist/main/*.exe
            dist/stub/RPWorld-Launcher.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
