name: Build and Release RPW Launcher

on:
  push:
    tags:
      - 'v*'

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      # ─────────────────────────────────────────────────────────
      # Swatinem/rust-cache — лучший Rust-кэш.
      # Первая сборка: ~15 мин. Последующие: ~3-5 мин.
      # Кэширует ~/.cargo/registry (общий) + оба target/
      # ─────────────────────────────────────────────────────────
      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            src-tauri -> target
            stub/src-tauri -> target
          cache-on-failure: true
          shared-key: "rpw-${{ runner.os }}"

      # ─── Главное приложение ───────────────────────────────────
      - name: Install main app dependencies
        run: npm ci

      - name: Build main Tauri app (NSIS installer)
        run: npm run tauri build
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ""
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""

      # ─── Stub / Красивый установщик ──────────────────────────
      - name: Install stub dependencies
        working-directory: stub
        run: npm ci

      - name: Build stub Tauri app
        working-directory: stub
        run: npm run tauri build
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ""
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""

      # ─── Артефакты ───────────────────────────────────────────
      - name: Find NSIS installer (main app)
        id: nsis
        shell: pwsh
        run: |
          $f = Get-ChildItem -Recurse "src-tauri\target\release\bundle\nsis" `
               -Filter "*-setup.exe" -ErrorAction SilentlyContinue |
               Select-Object -First 1
          if (-not $f) { Write-Error "NSIS not found!"; exit 1 }
          "NSIS_PATH=$($f.FullName)" >> $env:GITHUB_OUTPUT
          Write-Host "NSIS: $($f.FullName)"

      - name: Prepare RPWorld-Launcher.exe (stub binary)
        id: stub_bin
        shell: pwsh
        run: |
          # Берём сырой .exe бинарник stub, а не его NSIS-установщик
          $src = "stub\src-tauri\target\release\rpw-stub.exe"
          if (-not (Test-Path $src)) { Write-Error "Stub binary not found!"; exit 1 }
          Copy-Item $src "RPWorld-Launcher.exe" -Force
          "STUB_PATH=RPWorld-Launcher.exe" >> $env:GITHUB_OUTPUT
          Write-Host "Stub binary: $src"

      # ─── Версия и релиз ──────────────────────────────────────
      - name: Get version from tag
        id: ver
        shell: pwsh
        run: |
          $v = "${{ github.ref_name }}" -replace '^v', ''
          "VERSION=$v" >> $env:GITHUB_OUTPUT
          Write-Host "Version: $v"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "RPWorld Launcher v${{ steps.ver.outputs.VERSION }}"
          body: |
            ## RPWorld Launcher v${{ steps.ver.outputs.VERSION }}

            ### Что скачать

            | Файл | Описание |
            |---|---|
            | **`RPWorld-Launcher.exe`** | ⭐ **Рекомендуется** — умный установщик: если лаунчер уже установлен — запустит его, если нет — скачает и установит автоматически с красивым UI |
            | `RPWorld.Launcher_*_x64-setup.exe` | Прямой NSIS-установщик |

            ---
            > ℹ️ `Source code (zip/tar.gz)` — это исходный код, **не нужен** обычным пользователям
          draft: false
          prerelease: false
          files: |
            ${{ steps.nsis.outputs.NSIS_PATH }}
            ${{ steps.stub_bin.outputs.STUB_PATH }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
