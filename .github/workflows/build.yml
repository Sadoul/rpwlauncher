name: Build and Release RPW Launcher

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Rust dependencies
        uses: swatinem/rust-cache@v2
        with:
          workspaces: |
            src-tauri
            stub

      - name: Install frontend dependencies
        run: npm install

      - name: Build stub launcher (RPWorld-Launcher.exe)
        shell: pwsh
        run: |
          Set-Location stub
          cargo build --release --target x86_64-pc-windows-msvc
          Set-Location ..

      - name: Build Tauri app (NSIS installer + bare exe)
        run: npm run tauri build -- --bundles nsis
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}

      - name: Prepare release assets
        id: assets
        shell: pwsh
        run: |
          # NSIS installer
          $installer = Get-ChildItem -Recurse -Path "src-tauri/target/release/bundle/nsis" -Filter "*.exe" | Select-Object -First 1
          echo "INSTALLER_PATH=$($installer.FullName)" >> $env:GITHUB_OUTPUT

          # Bare app exe (for fast delta updates — just replaces the binary)
          $bareExe = "src-tauri/target/release/RPWorld Launcher.exe"
          if (Test-Path $bareExe) {
            $destBare = "src-tauri/target/release/RPWorld-Launcher-app.exe"
            Copy-Item $bareExe $destBare
            echo "BARE_EXE_PATH=$destBare" >> $env:GITHUB_OUTPUT
          } else {
            echo "BARE_EXE_PATH=" >> $env:GITHUB_OUTPUT
          }

          # Stub exe (installer + shortcut in one)
          $stub = "stub/target/x86_64-pc-windows-msvc/release/RPWorld-Launcher.exe"
          echo "STUB_PATH=$stub" >> $env:GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          name: "RPWorld Launcher ${{ github.ref_name }}"
          body: |
            ## RPWorld Launcher ${{ github.ref_name }}

            ---

            ### Как установить и запустить

            **`RPWorld-Launcher.exe`** — скачай один раз, положи на рабочий стол.
            - Лаунчер **не установлен** → автоматически скачает и установит
            - Лаунчер **установлен** → мгновенно запустит
            - **Обновление** → красивый встроенный интерфейс обновления

            ---

            ### Полный установщик

            `RPWorld.Launcher_${{ github.ref_name }}_x64-setup.exe` — стандартный NSIS установщик

            ---

            ### Данные лаунчера
            `%APPDATA%\.rpworld`

            mc_version: 1.20.1
          files: |
            ${{ steps.assets.outputs.INSTALLER_PATH }}
            ${{ steps.assets.outputs.STUB_PATH }}
            ${{ steps.assets.outputs.BARE_EXE_PATH }}
          draft: false
          prerelease: false
