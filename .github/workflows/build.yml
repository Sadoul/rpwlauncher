name: Build and Release RPW Launcher

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Rust dependencies
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend dependencies
        run: npm install

      - name: Build Tauri app (NSIS installer)
        run: npm run tauri build -- --bundles nsis
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}

      - name: Find built installer
        id: find_installer
        shell: pwsh
        run: |
          $installer = Get-ChildItem -Recurse -Path "src-tauri/target/release/bundle/nsis" -Filter "*.exe" | Select-Object -First 1
          echo "INSTALLER_PATH=$($installer.FullName)" >> $env:GITHUB_OUTPUT
          echo "INSTALLER_NAME=$($installer.Name)" >> $env:GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          name: "RPWorld Launcher ${{ github.ref_name }}"
          body: |
            ## RPWorld Launcher ${{ github.ref_name }}
            
            ### Установка
            1. Скачайт�� `RPWorld-Launcher_${{ github.ref_name }}_x64-setup.exe`
            2. Запустите установщик
            3. Лаунчер установится и запустится автоматически
            
            ### Данные лаунчера
            Файлы хранятся в: `%APPDATA%\.rpworld`
            
            ### Изменения
            Смотрите историю коммитов.
            
            mc_version: 1.20.1
          files: |
            ${{ steps.find_installer.outputs.INSTALLER_PATH }}
          draft: false
          prerelease: false
