name: Build and Release RPW Launcher

on:
  push:
    tags:
      - 'v*'

# ─────────────────────────────────────────────────────────────────────────────
# Два независимых job'а компилируются ПАРАЛЛЕЛЬНО, потом третий собирает релиз.
# Первый холодный прогон: ~8-10 мин. Последующие (кэш): ~3-5 мин.
# ─────────────────────────────────────────────────────────────────────────────

jobs:
  # ══════════════════════════════════════════════════════════════
  # Job 1 — Главное приложение (NSIS установщик)
  # ══════════════════════════════════════════════════════════════
  build-main:
    name: "Build main app (NSIS)"
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Rust cache (main app)
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "src-tauri -> target"
          shared-key: "rpw-main-${{ runner.os }}"
          cache-on-failure: true

      - name: Install dependencies
        run: npm ci

      - name: Build Tauri app
        run: npm run tauri build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ""
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""

      - name: Find NSIS installer
        id: nsis
        shell: pwsh
        run: |
          $f = Get-ChildItem -Recurse "src-tauri\target\release\bundle\nsis" `
               -Filter "*-setup.exe" -ErrorAction SilentlyContinue |
               Select-Object -First 1
          if (-not $f) { Write-Error "NSIS not found!"; exit 1 }
          Copy-Item $f.FullName "nsis-setup.exe" -Force
          Write-Host "Found: $($f.FullName)"

      - name: Upload NSIS installer
        uses: actions/upload-artifact@v4
        with:
          name: nsis-installer
          path: nsis-setup.exe
          retention-days: 1

  # ══════════════════════════════════════════════════════════════
  # Job 2 — Stub (умный установщик/ярлык)
  # ══════════════════════════════════════════════════════════════
  build-stub:
    name: "Build stub installer"
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: stub/package-lock.json

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Rust cache (stub)
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "stub/src-tauri -> target"
          shared-key: "rpw-stub-${{ runner.os }}"
          cache-on-failure: true

      - name: Install stub dependencies
        working-directory: stub
        run: npm ci

      - name: Build stub
        working-directory: stub
        run: npm run tauri build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ""
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""

      - name: Prepare stub binary
        shell: pwsh
        run: |
          $src = "stub\src-tauri\target\release\rpw-stub.exe"
          if (-not (Test-Path $src)) { Write-Error "Stub binary not found!"; exit 1 }
          Copy-Item $src "RPWorld-Launcher.exe" -Force
          Write-Host "Stub binary ready: $src"

      - name: Upload stub binary
        uses: actions/upload-artifact@v4
        with:
          name: stub-binary
          path: RPWorld-Launcher.exe
          retention-days: 1

  # ══════════════════════════════════════════════════════════════
  # Job 3 — Создание релиза (ждёт оба)
  # ══════════════════════════════════════════════════════════════
  release:
    name: "Create GitHub Release"
    runs-on: windows-latest
    needs: [build-main, build-stub]
    permissions:
      contents: write

    steps:
      - name: Download NSIS installer
        uses: actions/download-artifact@v4
        with:
          name: nsis-installer

      - name: Download stub binary
        uses: actions/download-artifact@v4
        with:
          name: stub-binary

      - name: Get version from tag
        id: ver
        shell: pwsh
        run: |
          $v = "${{ github.ref_name }}" -replace '^v', ''
          "VERSION=$v" >> $env:GITHUB_OUTPUT
          Write-Host "Version: $v"

      - name: Rename NSIS installer with version
        shell: pwsh
        run: |
          Rename-Item "nsis-setup.exe" "RPWorld.Launcher_${{ steps.ver.outputs.VERSION }}_x64-setup.exe" -Force

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "RPWorld Launcher v${{ steps.ver.outputs.VERSION }}"
          body: |
            ## RPWorld Launcher v${{ steps.ver.outputs.VERSION }}

            ### Что скачать

            | Файл | Описание |
            |---|---|
            | **`RPWorld-Launcher.exe`** | ⭐ **Рекомендуется** — если лаунчер уже установлен — запустит, если нет — скачает и установит автоматически |
            | `RPWorld.Launcher_*_x64-setup.exe` | Прямой NSIS-установщик |

            ---
            > ℹ️ `Source code (zip/tar.gz)` — исходный код, не нужен пользователям
          draft: false
          prerelease: false
          files: |
            RPWorld.Launcher_${{ steps.ver.outputs.VERSION }}_x64-setup.exe
            RPWorld-Launcher.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
