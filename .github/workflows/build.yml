name: Build and Release RPW Launcher

on:
  push:
    tags:
      - 'v*'

# ─────────────────────────────────────────────────────────────────────────────
# Two parallel jobs: main app + stub → merge into release
# ─────────────────────────────────────────────────────────────────────────────

jobs:
  # ── 1. Main Tauri app ───────────────────────────────────────────────────────
  build-main:
    name: Build Main App
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      # Node
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # Rust
      - uses: dtolnay/rust-toolchain@stable

      # sccache — компилятор-кэш, экономит 3-5 мин на повторных билдах
      - name: Install sccache
        uses: mozilla-actions/sccache-action@v0.0.5

      - name: Configure sccache
        run: |
          echo "SCCACHE_GHA_ENABLED=true" >> $env:GITHUB_ENV
          echo "RUSTC_WRAPPER=sccache" >> $env:GITHUB_ENV

      # Rust dependency cache (vendor-level)
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target
          cache-on-failure: true

      # Frontend deps
      - name: Install npm deps
        run: npm ci

      # Build Tauri (NSIS)
      - name: Build Tauri app
        run: npm run tauri build -- --bundles nsis
        env:
          TAURI_SIGNING_PRIVATE_KEY: ""
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""

      # Upload NSIS installer as artifact
      - name: Upload main installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: main-installer
          path: src-tauri/target/release/bundle/nsis/*.exe
          retention-days: 1

  # ── 2. Stub installer ───────────────────────────────────────────────────────
  build-stub:
    name: Build Stub Installer
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: dtolnay/rust-toolchain@stable

      - name: Install sccache
        uses: mozilla-actions/sccache-action@v0.0.5

      - name: Configure sccache
        run: |
          echo "SCCACHE_GHA_ENABLED=true" >> $env:GITHUB_ENV
          echo "RUSTC_WRAPPER=sccache" >> $env:GITHUB_ENV

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: stub/src-tauri -> target
          cache-on-failure: true

      - name: Install stub npm deps
        working-directory: stub
        run: npm ci

      - name: Build stub
        working-directory: stub
        run: npm run tauri build -- --bundles nsis
        env:
          TAURI_SIGNING_PRIVATE_KEY: ""
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""

      - name: Upload stub artifact
        uses: actions/upload-artifact@v4
        with:
          name: stub-installer
          path: stub/src-tauri/target/release/bundle/nsis/*.exe
          retention-days: 1

  # ── 3. Publish release ──────────────────────────────────────────────────────
  release:
    name: Publish Release
    needs: [build-main, build-stub]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download main installer
        uses: actions/download-artifact@v4
        with:
          name: main-installer
          path: dist/main

      - name: Download stub installer
        uses: actions/download-artifact@v4
        with:
          name: stub-installer
          path: dist/stub

      - name: List artifacts
        run: ls -R dist/

      - name: Rename stub exe
        run: |
          STUB=$(ls dist/stub/*.exe | head -1)
          cp "$STUB" dist/RPWorld-Launcher.exe

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "RPWorld Launcher ${{ github.ref_name }}"
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            dist/main/*.exe
            dist/RPWorld-Launcher.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
