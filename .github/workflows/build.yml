name: Build and Release RPW Launcher

on:
  push:
    tags:
      - 'v*'

jobs:
  # ── 1. Main Tauri app ───────────────────────────────────────────────────────
  build-main:
    name: Build Main App
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      # Rust dependency cache — caches compiled crates between runs
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target
          cache-on-failure: true
          shared-key: main-app

      - name: Install npm deps
        run: npm ci

      - name: Build Tauri app (NSIS)
        run: npm run tauri build -- --bundles nsis
        env:
          TAURI_SIGNING_PRIVATE_KEY: ""
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""

      - name: Upload main installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: main-installer
          path: src-tauri/target/release/bundle/nsis/*.exe
          retention-days: 1

  # ── 2. Stub installer ───────────────────────────────────────────────────────
  build-stub:
    name: Build Stub Installer
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: stub/src-tauri -> target
          cache-on-failure: true
          shared-key: stub-app

      - name: Install stub npm deps
        working-directory: stub
        run: npm ci

      - name: Build stub (NSIS)
        working-directory: stub
        run: npm run tauri build -- --bundles nsis
        env:
          TAURI_SIGNING_PRIVATE_KEY: ""
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""

      - name: Upload stub artifact
        uses: actions/upload-artifact@v4
        with:
          name: stub-installer
          path: stub/src-tauri/target/release/bundle/nsis/*.exe
          retention-days: 1

  # ── 3. Publish release ──────────────────────────────────────────────────────
  release:
    name: Publish Release
    needs: [build-main, build-stub]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download main installer
        uses: actions/download-artifact@v4
        with:
          name: main-installer
          path: dist/main

      - name: Download stub installer
        uses: actions/download-artifact@v4
        with:
          name: stub-installer
          path: dist/stub

      - name: Rename stub to RPWorld-Launcher.exe
        run: |
          STUB=$(ls dist/stub/*.exe | head -1)
          cp "$STUB" dist/RPWorld-Launcher.exe

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "RPWorld Launcher ${{ github.ref_name }}"
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            dist/main/*.exe
            dist/RPWorld-Launcher.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
