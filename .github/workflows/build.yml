name: Build and Release RPW Launcher

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      create_release:
        description: 'Create a GitHub release?'
        required: false
        default: 'false'

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      # ---- Специализированный Rust-кэш (Swatinem) ----
      # После первой сборки следующие занимают 2-4 мин вместо 15-20
      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          # Кэшируем оба Cargo-проекта (но target общий через workspace)
          workspaces: |
            src-tauri -> target
            stub/src-tauri -> target
          cache-on-failure: true
          shared-key: "rpw-windows-${{ runner.os }}"

      # ---- Сборка главного приложения ----
      - name: Install main app dependencies
        run: npm ci

      - name: Build main Tauri app (NSIS installer)
        run: npm run tauri build
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ""
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""

      # ---- Сборка stub (только бинарник, без NSIS — вдвое быстрее) ----
      - name: Install stub dependencies
        working-directory: stub
        run: npm ci

      - name: Build stub binary (no bundling)
        working-directory: stub
        run: npm run tauri -- build --bundles none
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ""
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""

      # ---- Поиск артефактов ----
      - name: Find NSIS installer
        id: nsis
        shell: pwsh
        run: |
          # Ищем в src-tauri/target (без workspace) и в target/ (с workspace)
          $dirs = @(
            "src-tauri\target\release\bundle\nsis",
            "target\release\bundle\nsis"
          )
          foreach ($d in $dirs) {
            if (Test-Path $d) {
              $f = Get-ChildItem $d -Filter "*-setup.exe" | Select-Object -First 1
              if ($f) {
                "NSIS_PATH=$($f.FullName)" >> $env:GITHUB_OUTPUT
                Write-Host "NSIS found: $($f.FullName)"
                exit 0
              }
            }
          }
          Write-Error "NSIS installer not found in any expected location!"
          exit 1

      - name: Prepare stub exe (RPWorld-Launcher.exe)
        id: stub
        shell: pwsh
        run: |
          $candidates = @(
            "stub\src-tauri\target\release\rpw-stub.exe",
            "target\release\rpw-stub.exe"
          )
          foreach ($p in $candidates) {
            if (Test-Path $p) {
              Copy-Item $p "RPWorld-Launcher.exe" -Force
              "STUB_PATH=RPWorld-Launcher.exe" >> $env:GITHUB_OUTPUT
              Write-Host "Stub found: $p"
              exit 0
            }
          }
          Write-Error "Stub binary not found!"
          exit 1

      # ---- Версия ----
      - name: Get version
        id: ver
        shell: pwsh
        run: |
          $v = "${{ github.ref_name }}" -replace '^v', ''
          if ([string]::IsNullOrEmpty($v) -or $v -eq 'main') {
            # Fallback: read from tauri.conf.json
            $conf = Get-Content "src-tauri\tauri.conf.json" | ConvertFrom-Json
            $v = $conf.version
          }
          "VERSION=$v" >> $env:GITHUB_OUTPUT
          Write-Host "Version: $v"

      # ---- Публикация релиза (только при push тега) ----
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          name: "RPWorld Launcher v${{ steps.ver.outputs.VERSION }}"
          body: |
            ## RPWorld Launcher v${{ steps.ver.outputs.VERSION }}

            ### Что скачать
            | Файл | Описание |
            |---|---|
            | **`RPWorld-Launcher.exe`** | ⬅ **Рекомендуется** — красивый установщик, запускает или устанавливает автоматически |
            | `RPWorld.Launcher_*_x64-setup.exe` | Прямой NSIS установщик |

            > **Source code (zip/tar.gz)** — это исходный код, не для пользователей
          draft: false
          prerelease: false
          files: |
            ${{ steps.nsis.outputs.NSIS_PATH }}
            ${{ steps.stub.outputs.STUB_PATH }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
