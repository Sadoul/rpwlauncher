name: Build and Release RPW Launcher

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
            stub/src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      # ---- Build Main Launcher ----
      - name: Install main app dependencies
        run: npm ci

      - name: Build main Tauri app (NSIS installer)
        run: npm run tauri build
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ""
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""

      # ---- Build Stub / Shortcut launcher ----
      - name: Install stub dependencies
        working-directory: stub
        run: npm ci

      - name: Build stub Tauri app
        working-directory: stub
        run: npm run tauri build
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ""
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""

      # ---- Find built artifacts ----
      - name: Find NSIS installer
        id: find_nsis
        shell: pwsh
        run: |
          $nsis = Get-ChildItem -Recurse "src-tauri/target/release/bundle/nsis" -Filter "*-setup.exe" -ErrorAction SilentlyContinue | Select-Object -First 1
          if ($nsis) {
            echo "NSIS_PATH=$($nsis.FullName)" >> $env:GITHUB_OUTPUT
            echo "NSIS_NAME=$($nsis.Name)" >> $env:GITHUB_OUTPUT
            Write-Host "Found NSIS: $($nsis.FullName)"
          } else {
            Write-Error "NSIS installer not found!"
            exit 1
          }

      - name: Find stub EXE
        id: find_stub
        shell: pwsh
        run: |
          # Look for the stub's built exe (the actual app binary, not the installer)
          $stubExe = Get-ChildItem -Recurse "stub/src-tauri/target/release" -Filter "rpw-stub.exe" -ErrorAction SilentlyContinue | 
            Where-Object { $_.FullName -notmatch "\\build\\" -and $_.FullName -notmatch "\\deps\\" } | 
            Select-Object -First 1
          if (-not $stubExe) {
            # Fallback: find the NSIS installer for stub and extract or use another name
            $stubExe = Get-ChildItem -Recurse "stub/src-tauri/target/release" -Filter "*.exe" -ErrorAction SilentlyContinue | 
              Where-Object { $_.Name -notmatch "setup" -and $_.FullName -notmatch "\\build\\" -and $_.FullName -notmatch "\\deps\\" } |
              Select-Object -First 1
          }
          if ($stubExe) {
            # Copy and rename to RPWorld-Launcher.exe
            $dest = "stub/src-tauri/target/release/RPWorld-Launcher.exe"
            Copy-Item $stubExe.FullName $dest -Force
            echo "STUB_PATH=$dest" >> $env:GITHUB_OUTPUT
            Write-Host "Found stub: $($stubExe.FullName)"
          } else {
            Write-Error "Stub exe not found!"
            exit 1
          }

      # ---- Publish Release ----
      - name: Extract version from tag
        id: version
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $ver = $tag -replace '^v', ''
          echo "VERSION=$ver" >> $env:GITHUB_OUTPUT

      - name: Create GitHub Release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          name: "RPWorld Launcher v${{ steps.version.outputs.VERSION }}"
          body: |
            ## RPWorld Launcher v${{ steps.version.outputs.VERSION }}

            ### Скачать
            | Файл | Описание |
            |------|----------|
            | `RPWorld-Launcher.exe` | **Рекомендуется** — красивый установщик с автоматическим запуском |
            | `RPWorld.Launcher_*_x64-setup.exe` | Полный NSIS установщик |

            ### Установка
            1. Скачай `RPWorld-Launcher.exe`
            2. Запусти — он сам скачает и установит лаунчер или запустит его если уже установлен
          draft: false
          prerelease: false
          files: |
            ${{ steps.find_nsis.outputs.NSIS_PATH }}
            ${{ steps.find_stub.outputs.STUB_PATH }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
