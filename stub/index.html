<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <title>RPWorld Launcher</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: transparent;
      color: #fff;
      height: 100vh;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      user-select: none;
    }

    .bg {
      position: fixed;
      inset: 0;
      background: #0a0e1a;
      border-radius: 20px;
      overflow: hidden;
    }

    .bg::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse 90% 90% at 15% 40%, rgba(99,102,241,0.18) 0%, transparent 55%),
        radial-gradient(ellipse 70% 70% at 85% 60%, rgba(168,85,247,0.14) 0%, transparent 55%),
        radial-gradient(ellipse 50% 50% at 50% 100%, rgba(59,130,246,0.1) 0%, transparent 50%);
      animation: bgPulse 5s ease-in-out infinite alternate;
    }

    @keyframes bgPulse {
      from { opacity: 0.6; }
      to { opacity: 1; }
    }

    /* Floating particles */
    .particle {
      position: absolute;
      border-radius: 50%;
      pointer-events: none;
      animation: float linear infinite;
    }

    @keyframes float {
      0% { transform: translateY(100vh) scale(0); opacity: 0; }
      10% { opacity: 1; }
      90% { opacity: 0.3; }
      100% { transform: translateY(-20px) scale(1); opacity: 0; }
    }

    /* Titlebar drag region */
    .titlebar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 36px;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: flex-end;
      padding: 0 12px;
    }

    .close-btn {
      width: 28px;
      height: 28px;
      border-radius: 8px;
      border: none;
      background: rgba(255,255,255,0.08);
      color: rgba(255,255,255,0.5);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      transition: all 0.2s;
      line-height: 1;
    }

    .close-btn:hover {
      background: rgba(239,68,68,0.7);
      color: white;
    }

    /* Main card */
    .card {
      position: relative;
      z-index: 10;
      background: rgba(255,255,255,0.04);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 24px;
      padding: 44px 52px 40px;
      text-align: center;
      width: 440px;
      box-shadow:
        0 30px 60px rgba(0,0,0,0.6),
        0 0 0 1px rgba(255,255,255,0.03) inset;
    }

    /* Logo */
    .logo {
      width: 88px;
      height: 88px;
      margin: 0 auto 28px;
      position: relative;
    }

    .logo-ring {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      border: 2px solid transparent;
    }

    .logo-ring.r1 {
      border-top-color: rgba(99,102,241,0.9);
      border-right-color: rgba(99,102,241,0.2);
      animation: spin 2.5s linear infinite;
    }

    .logo-ring.r2 {
      inset: 10px;
      border-bottom-color: rgba(168,85,247,0.9);
      border-left-color: rgba(168,85,247,0.2);
      animation: spin 1.8s linear infinite reverse;
    }

    .logo-ring.r3 {
      inset: 20px;
      border-top-color: rgba(59,130,246,0.7);
      border-left-color: rgba(59,130,246,0.15);
      animation: spin 3.5s linear infinite;
    }

    .logo-inner {
      position: absolute;
      inset: 28px;
      background: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      font-weight: 900;
      letter-spacing: 0.5px;
      box-shadow:
        0 0 20px rgba(99,102,241,0.6),
        0 0 40px rgba(168,85,247,0.3);
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* Texts */
    h1 {
      font-size: 26px;
      font-weight: 800;
      margin-bottom: 6px;
      background: linear-gradient(135deg, #ffffff 40%, rgba(168,85,247,0.9));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .subtitle {
      font-size: 13px;
      color: rgba(255,255,255,0.45);
      margin-bottom: 32px;
      min-height: 18px;
      transition: all 0.3s;
    }

    /* Progress */
    .progress-wrap {
      background: rgba(255,255,255,0.07);
      border-radius: 100px;
      height: 6px;
      overflow: hidden;
      margin-bottom: 10px;
    }

    .progress-bar {
      height: 100%;
      background: linear-gradient(90deg, #6366f1, #a855f7, #3b82f6);
      background-size: 200% 100%;
      border-radius: 100px;
      width: 0%;
      transition: width 0.4s ease;
      animation: gradientSlide 2s linear infinite;
    }

    .progress-bar.done {
      animation: none;
      background: linear-gradient(90deg, #22c55e, #10b981);
    }

    .progress-bar.error {
      animation: none;
      background: linear-gradient(90deg, #ef4444, #f97316);
    }

    @keyframes gradientSlide {
      0% { background-position: 0% 0%; }
      100% { background-position: 200% 0%; }
    }

    .progress-info {
      display: flex;
      justify-content: space-between;
      font-size: 12px;
      color: rgba(255,255,255,0.4);
      margin-bottom: 20px;
    }

    .status {
      font-size: 13px;
      color: rgba(255,255,255,0.65);
      min-height: 20px;
      transition: all 0.3s;
    }

    .status.error-text { color: #f87171; }

    /* Retry button */
    .btn {
      margin-top: 20px;
      padding: 11px 28px;
      background: linear-gradient(135deg, #6366f1, #a855f7);
      border: none;
      border-radius: 10px;
      color: white;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      display: none;
    }

    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(99,102,241,0.5);
    }

    /* Version tag */
    .ver {
      position: absolute;
      bottom: 14px;
      right: 20px;
      font-size: 10px;
      color: rgba(255,255,255,0.15);
    }

    /* Checkmark animation */
    .checkmark {
      display: none;
      width: 48px;
      height: 48px;
      margin: 0 auto 12px;
      border-radius: 50%;
      background: rgba(34,197,94,0.15);
      align-items: center;
      justify-content: center;
      font-size: 22px;
      animation: pop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    @keyframes pop {
      0% { transform: scale(0); opacity: 0; }
      100% { transform: scale(1); opacity: 1; }
    }
  </style>
</head>
<body>

  <div class="bg" id="bgEl"></div>

  <div class="titlebar" data-tauri-drag-region>
    <button class="close-btn" onclick="closeApp()" title="Закрыть">✕</button>
  </div>

  <div class="card">
    <div class="checkmark" id="checkmark">✓</div>
    <div class="logo" id="logoWrap">
      <div class="logo-ring r1"></div>
      <div class="logo-ring r2"></div>
      <div class="logo-ring r3"></div>
      <div class="logo-inner">RPW</div>
    </div>

    <h1>RPWorld Launcher</h1>
    <div class="subtitle" id="subtitle">Подготовка...</div>

    <div class="progress-wrap">
      <div class="progress-bar" id="bar"></div>
    </div>
    <div class="progress-info">
      <span id="downloaded"></span>
      <span id="speed"></span>
    </div>

    <div class="status" id="statusMsg">Инициализация...</div>
    <button class="btn" id="retryBtn" onclick="run()">Повторить</button>
  </div>

  <script>
    const { invoke } = window.__TAURI__.core;
    const { listen } = window.__TAURI__.event;
    const { getCurrentWindow } = window.__TAURI__.window;

    function setProgress(p) {
      document.getElementById('bar').style.width = p + '%';
    }
    function setStatus(msg, isError) {
      const el = document.getElementById('statusMsg');
      el.textContent = msg;
      el.className = 'status' + (isError ? ' error-text' : '');
    }
    function setSubtitle(msg) {
      document.getElementById('subtitle').textContent = msg;
    }
    function showRetry() {
      document.getElementById('retryBtn').style.display = 'inline-block';
    }
    function hideRetry() {
      document.getElementById('retryBtn').style.display = 'none';
    }
    function setDownloadInfo(dl, spd) {
      document.getElementById('downloaded').textContent = dl || '';
      document.getElementById('speed').textContent = spd || '';
    }
    function showDone() {
      document.getElementById('bar').classList.add('done');
      document.getElementById('logoWrap').style.display = 'none';
      const ck = document.getElementById('checkmark');
      ck.style.display = 'flex';
    }

    async function closeApp() {
      await getCurrentWindow().close();
    }

    async function run() {
      hideRetry();
      setDownloadInfo('', '');
      document.getElementById('bar').classList.remove('error', 'done');
      setProgress(5);
      setStatus('Проверка установки...');

      try {
        setStatus('Поиск RPWorld Launcher...');
        const installed = await invoke('check_installed');

        if (installed) {
          setSubtitle('Запуск RPWorld Launcher');
          setProgress(100);
          setStatus('Запускаем...');
          showDone();
          await invoke('launch_launcher');
        } else {
          setSubtitle('Установка RPWorld Launcher');
          setStatus('Получение информации о последней версии...');
          setProgress(10);

          const unlisten = await listen('install-progress', (event) => {
            const { percent, status, downloaded, speed } = event.payload;
            setProgress(percent);
            setStatus(status);
            if (downloaded !== undefined) setDownloadInfo(downloaded, speed || '');
          });

          await invoke('download_and_install');
          unlisten();

          showDone();
          setSubtitle('Установка завершена!');
          setProgress(100);
          setStatus('Запускаем RPWorld Launcher...');
          setDownloadInfo('', '');

          // Small delay so user sees the success state
          await new Promise(r => setTimeout(r, 1200));
          await invoke('launch_launcher');
        }
      } catch (err) {
        document.getElementById('bar').classList.add('error');
        setStatus('Ошибка: ' + err, true);
        setSubtitle('Что-то пошло не так');
        showRetry();
      }
    }

    // Generate floating particles
    function spawnParticle() {
      const bg = document.getElementById('bgEl');
      const p = document.createElement('div');
      p.className = 'particle';
      const size = Math.random() * 4 + 2;
      const colors = ['rgba(99,102,241,0.4)', 'rgba(168,85,247,0.4)', 'rgba(59,130,246,0.3)', 'rgba(255,255,255,0.15)'];
      p.style.cssText = `
        width: ${size}px; height: ${size}px;
        left: ${Math.random() * 100}%;
        background: ${colors[Math.floor(Math.random()*colors.length)]};
        animation-duration: ${Math.random() * 8 + 6}s;
        animation-delay: ${Math.random() * 4}s;
      `;
      bg.appendChild(p);
      p.addEventListener('animationend', () => p.remove());
    }

    setInterval(spawnParticle, 600);
    for (let i = 0; i < 8; i++) spawnParticle();

    // Auto-start
    run();
  </script>
</body>
</html>
