<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <title>RPWorld Launcher</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --cream:     #FAF6F1;
      --cream-dark:#EDE4D9;
      --ivory:     #FFF9F3;
      --brown-900: #2C1810;
      --brown-700: #4A3228;
      --brown-500: #6B4F3A;
      --brown-400: #8B6F47;
      --brown-200: #C4A882;
      --brown-100: #E8D5BD;
      --orange:    #D4793A;
      --orange-lt: #E8A87C;
      --orange-dk: #B8612A;
      --success:   #5D9E5F;
      --error:     #C0392B;
      --shadow:    rgba(44,24,16,0.08);
    }

    body {
      font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
      background: transparent;
      color: var(--brown-900);
      height: 100vh;
      overflow: hidden;
      user-select: none;
    }

    /* ── Window chrome ─────────────────────────────── */
    .window {
      position: fixed;
      inset: 0;
      background: var(--cream);
      border-radius: 16px;
      border: 1px solid var(--cream-dark);
      box-shadow:
        0 20px 60px rgba(44,24,16,0.12),
        0 2px 8px rgba(44,24,16,0.06);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Titlebar ──────────────────────────────────── */
    .titlebar {
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 12px 0 18px;
      flex-shrink: 0;
    }

    .titlebar-title {
      font-size: 12px;
      font-weight: 600;
      color: var(--brown-400);
      letter-spacing: 0.3px;
    }

    .titlebar-btns {
      display: flex;
      gap: 6px;
    }

    .tb-btn {
      width: 30px;
      height: 26px;
      border-radius: 6px;
      border: none;
      background: transparent;
      color: var(--brown-400);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      transition: all 0.15s;
    }
    .tb-btn:hover { background: var(--cream-dark); color: var(--brown-700); }
    .tb-btn.close:hover { background: var(--error); color: #fff; }

    /* ── Content ───────────────────────────────────── */
    .content {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 0 48px 36px;
    }

    /* ── Logo ──────────────────────────────────────── */
    .logo {
      width: 72px;
      height: 72px;
      margin-bottom: 24px;
      position: relative;
    }

    .logo-circle {
      position: absolute;
      inset: 0;
      border-radius: 16px;
      background: linear-gradient(145deg, var(--orange) 0%, var(--orange-dk) 100%);
      box-shadow:
        0 8px 24px rgba(212,121,58,0.25),
        0 2px 6px rgba(212,121,58,0.15);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      font-weight: 800;
      color: #fff;
      letter-spacing: 1px;
    }

    .logo-spinner {
      position: absolute;
      inset: -6px;
      border-radius: 20px;
      border: 2px solid transparent;
      border-top-color: var(--orange);
      border-right-color: rgba(212,121,58,0.2);
      animation: spin 1.5s linear infinite;
      opacity: 1;
      transition: opacity 0.3s;
    }
    .logo-spinner.hidden { opacity: 0; }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Typography ────────────────────────────────── */
    .heading {
      font-size: 22px;
      font-weight: 800;
      color: var(--brown-900);
      margin-bottom: 4px;
      letter-spacing: -0.3px;
    }

    .subtitle {
      font-size: 13px;
      font-weight: 500;
      color: var(--brown-400);
      margin-bottom: 28px;
      min-height: 18px;
    }

    /* ── Progress ──────────────────────────────────── */
    .progress-track {
      width: 100%;
      height: 6px;
      background: var(--cream-dark);
      border-radius: 100px;
      overflow: hidden;
      margin-bottom: 8px;
    }

    .progress-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--orange-dk), var(--orange), var(--orange-lt));
      border-radius: 100px;
      transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      position: relative;
    }

    .progress-fill.done {
      background: linear-gradient(90deg, #4E8E50, var(--success));
    }
    .progress-fill.error {
      background: linear-gradient(90deg, #A03225, var(--error));
    }

    .progress-row {
      display: flex;
      justify-content: space-between;
      width: 100%;
      font-size: 11px;
      font-weight: 500;
      color: var(--brown-200);
      margin-bottom: 16px;
      min-height: 16px;
    }

    .status-text {
      font-size: 13px;
      font-weight: 500;
      color: var(--brown-500);
      min-height: 20px;
      text-align: center;
    }
    .status-text.err { color: var(--error); }
    .status-text.ok  { color: var(--success); }

    /* ── Button ────────────────────────────────────── */
    .btn {
      margin-top: 18px;
      padding: 10px 28px;
      background: var(--orange);
      border: none;
      border-radius: 8px;
      color: #fff;
      font-family: inherit;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
      display: none;
      letter-spacing: 0.2px;
    }
    .btn:hover {
      background: var(--orange-dk);
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(212,121,58,0.3);
    }

    /* ── Checkmark ─────────────────────────────────── */
    .done-icon {
      display: none;
      width: 56px;
      height: 56px;
      margin-bottom: 20px;
      border-radius: 14px;
      background: rgba(93,158,95,0.1);
      align-items: center;
      justify-content: center;
    }
    .done-icon svg { width: 28px; height: 28px; }

    /* ── Footer ────────────────────────────────────── */
    .footer {
      font-size: 10px;
      color: var(--brown-200);
      position: absolute;
      bottom: 14px;
      right: 18px;
      letter-spacing: 0.3px;
    }
  </style>
</head>
<body>

<div class="window">
  <!-- Titlebar -->
  <div class="titlebar" data-tauri-drag-region>
    <span class="titlebar-title">RPWorld</span>
    <div class="titlebar-btns">
      <button class="tb-btn" id="minBtn" title="Свернуть">─</button>
      <button class="tb-btn close" id="closeBtn" title="Закрыть">✕</button>
    </div>
  </div>

  <!-- Content -->
  <div class="content">
    <!-- Done icon (hidden by default) -->
    <div class="done-icon" id="doneIcon">
      <svg viewBox="0 0 24 24" fill="none" stroke="#5D9E5F" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M20 6L9 17l-5-5"/>
      </svg>
    </div>

    <!-- Logo (visible by default) -->
    <div class="logo" id="logoWrap">
      <div class="logo-spinner" id="spinner"></div>
      <div class="logo-circle">RPW</div>
    </div>

    <div class="heading">RPWorld Launcher</div>
    <div class="subtitle" id="subtitle">Подготовка...</div>

    <div class="progress-track">
      <div class="progress-fill" id="bar"></div>
    </div>
    <div class="progress-row">
      <span id="downloaded"></span>
      <span id="speed"></span>
    </div>

    <div class="status-text" id="statusMsg">Инициализация...</div>
    <button class="btn" id="retryBtn">Повторить</button>
  </div>

  <div class="footer">v1.0.6</div>
</div>

<script>
  // Wait for Tauri APIs to be available
  document.addEventListener('DOMContentLoaded', () => {
    const { invoke } = window.__TAURI__.core;
    const { listen } = window.__TAURI__.event;
    const { getCurrentWindow } = window.__TAURI__.window;

    const bar       = document.getElementById('bar');
    const subtitle  = document.getElementById('subtitle');
    const statusMsg = document.getElementById('statusMsg');
    const retryBtn  = document.getElementById('retryBtn');
    const logoWrap  = document.getElementById('logoWrap');
    const spinner   = document.getElementById('spinner');
    const doneIcon  = document.getElementById('doneIcon');
    const dlInfo    = document.getElementById('downloaded');
    const spdInfo   = document.getElementById('speed');

    // ── Titlebar buttons ────────────────────────────
    document.getElementById('closeBtn').addEventListener('click', async () => {
      await getCurrentWindow().close();
    });
    document.getElementById('minBtn').addEventListener('click', async () => {
      await getCurrentWindow().minimize();
    });
    retryBtn.addEventListener('click', () => run());

    // ── Helpers ─────────────────────────────────────
    function setProgress(p)    { bar.style.width = p + '%'; }
    function setSubtitle(msg)  { subtitle.textContent = msg; }
    function setDlInfo(d, s)   { dlInfo.textContent = d || ''; spdInfo.textContent = s || ''; }

    function setStatus(msg, type) {
      statusMsg.textContent = msg;
      statusMsg.className = 'status-text' + (type === 'err' ? ' err' : type === 'ok' ? ' ok' : '');
    }

    function showDone() {
      bar.classList.add('done');
      logoWrap.style.display = 'none';
      doneIcon.style.display = 'flex';
      spinner.classList.add('hidden');
    }

    function reset() {
      retryBtn.style.display = 'none';
      bar.classList.remove('error', 'done');
      logoWrap.style.display = 'block';
      doneIcon.style.display = 'none';
      spinner.classList.remove('hidden');
      setDlInfo('', '');
    }

    // ── Main flow ───────────────────────────────────
    async function run() {
      reset();
      setProgress(5);
      setStatus('Проверка...');

      try {
        const installed = await invoke('check_installed');

        if (installed) {
          setSubtitle('Запуск RPWorld Launcher');
          setProgress(100);
          setStatus('Открываем...', 'ok');
          showDone();
          await invoke('launch_launcher');
        } else {
          setSubtitle('Установка RPWorld Launcher');
          setStatus('Подключение к серверу...');
          setProgress(8);

          const unlisten = await listen('install-progress', (event) => {
            const { percent, status, downloaded, speed } = event.payload;
            setProgress(percent);
            setStatus(status);
            if (downloaded !== undefined) setDlInfo(downloaded, speed || '');
          });

          await invoke('download_and_install');
          unlisten();

          showDone();
          setSubtitle('Установка завершена');
          setProgress(100);
          setStatus('Запускаем лаунчер...', 'ok');
          setDlInfo('', '');

          await new Promise(r => setTimeout(r, 1000));
          await invoke('launch_launcher');
        }
      } catch (err) {
        bar.classList.add('error');
        setStatus(String(err), 'err');
        setSubtitle('Не удалось установить');
        retryBtn.style.display = 'inline-block';
        spinner.classList.add('hidden');
      }
    }

    // Start
    run();
  });
</script>
</body>
</html>
